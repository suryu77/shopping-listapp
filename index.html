<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4a90e2;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #357abd;
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .clear-done {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .clear-done:hover {
      color: #c53030;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4a90e2;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .error-msg {
      text-align: center;
      color: #e53e3e;
      font-size: 0.85rem;
      padding: 8px 0;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" maxlength="80" />
      <button id="addBtn">추가</button>
    </div>
    <div class="stats">
      <span id="stats">0개 중 0개 완료</span>
      <button class="clear-done" id="clearDoneBtn">완료 항목 삭제</button>
    </div>
    <p class="error-msg" id="errorMsg"></p>
    <ul id="list"></ul>
    <p class="loading" id="loading">불러오는 중...</p>
    <p class="empty" id="empty" style="display:none">아직 아이템이 없어요.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://tisjcuixgsyrdpweligz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpc2pjdWl4Z3N5cmRwd2VsaWd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NjQ5NDQsImV4cCI6MjA5NTU0MDk0NH0.BnmSqYTFnyxdmrH0RAB9p52JLX5SFP1TmNQXhifnOvQ';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const loading = document.getElementById('loading');
      const stats = document.getElementById('stats');

      loading.style.display = 'none';

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      stats.textContent = `${total}개 중 ${done}개 완료`;
      empty.style.display = total === 0 ? 'block' : 'none';

      list.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggle(item.id));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.classList.toggle('done', item.checked);
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.title = '삭제';
        del.addEventListener('click', () => remove(item.id));

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    async function loadItems() {
      showError('');
      const { data, error } = await client
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오는 데 실패했습니다.');
        document.getElementById('loading').style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const addBtn = document.getElementById('addBtn');
      const text = input.value.trim();
      if (!text) return;

      addBtn.disabled = true;
      showError('');

      const { data, error } = await client
        .from('shopping_items')
        .insert([{ text, checked: false }])
        .select();

      addBtn.disabled = false;

      if (error) {
        showError('아이템 추가에 실패했습니다.');
        return;
      }

      items.push(data[0]);
      input.value = '';
      render();
      input.focus();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      const { error } = await client
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        showError('상태 변경에 실패했습니다.');
        return;
      }

      item.checked = !item.checked;
      render();
    }

    async function remove(id) {
      const { error } = await client
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제에 실패했습니다.');
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const { error } = await client
        .from('shopping_items')
        .delete()
        .eq('checked', true);

      if (error) {
        showError('완료 항목 삭제에 실패했습니다.');
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearDoneBtn').addEventListener('click', clearDone);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
